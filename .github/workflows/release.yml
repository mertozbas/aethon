name: Release

# Automatic publish-on-version-bump: when the version in pyproject.toml changes on
# main and hasn't been released yet, run the tests, publish to PyPI, and create the
# git tag + GitHub Release. Bumping the version is the only action needed to release.

on:
  push:
    branches: [main]

permissions:
  contents: write   # create the tag + GitHub Release

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Auto-publish on version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need existing tags to detect "already released"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read package version
        id: ver
        run: |
          V=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Package version: $V"

      - name: Release only if this version is new
        id: gate
        run: |
          if git rev-parse "refs/tags/v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "do_release=false" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.ver.outputs.version }} already tagged — nothing to release."
          else
            echo "do_release=true" >> "$GITHUB_OUTPUT"
            echo "Releasing v${{ steps.ver.outputs.version }}"
          fi

      - name: Install + test (release gate)
        if: steps.gate.outputs.do_release == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -q -m "not e2e"

      - name: Build
        if: steps.gate.outputs.do_release == 'true'
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        if: steps.gate.outputs.do_release == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/* --skip-existing

      - name: Tag + GitHub Release
        if: steps.gate.outputs.do_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: aethon v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          body: |
            AETHON v${{ steps.ver.outputs.version }} — a self-hosted, provider-agnostic personal AI assistant.

            ```bash
            pip install aethon-ai
            ```
            The PyPI distribution is `aethon-ai`; the command and import are `aethon`.
            See the [CHANGELOG](https://github.com/mertozbas/aethon/blob/main/CHANGELOG.md).
