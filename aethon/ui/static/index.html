<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <title>AETHON Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/dashboard/static/css/dashboard.css">
  <!-- Prevent FOUC: apply saved theme before render -->
  <script>
    (function(){
      var t = localStorage.getItem('aethon-theme');
      if (t) { try { var o = JSON.parse(t); Object.keys(o).forEach(function(k){ document.documentElement.style.setProperty(k, o[k]); }); } catch(e){} }
    })();
  </script>
</head>
<body>
  <!-- Grain overlay for depth -->
  <svg class="grain-overlay" aria-hidden="true">
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter>
    <rect width="100%" height="100%" filter="url(#grain)"/>
  </svg>

  <div id="app-shell">
    <!-- Sidebar -->
    <nav id="sidebar" role="navigation" aria-label="Main navigation"></nav>

    <!-- Main area -->
    <div id="main-area">
      <!-- Header -->
      <header id="header" role="banner"></header>

      <!-- Panel content -->
      <main id="content" role="main">
        <div class="loading-skeleton">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true"></div>

  <!-- ES modules -->
  <script type="module" src="/dashboard/static/js/app.js"></script>
</body>
</html>
