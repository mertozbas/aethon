# AETHON — Docker Compose
#
# Default — run AETHON headless (web UI + dashboard + webhook + messaging bots) and
# talk to a Meridian proxy running on your HOST machine (start `meridian` there first):
#
#     docker compose up --build
#     # open http://127.0.0.1:18790
#
# Fully-local inference instead (no host Meridian; runs an Ollama service in Compose):
#
#     docker compose --profile local up --build
#     # build the image with EXTRAS=ollama (below) so it has the Ollama client, then set
#     # provider: ollama / host: http://ollama:11434 in the data volume's config.yaml

services:
  aethon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXTRAS: ""              # set to "ollama" to bundle the local-inference client
    image: aethon:latest
    container_name: aethon
    ports:
      - "18790:18790"
    volumes:
      - aethon-data:/home/aethon/.aethon
    extra_hosts:
      - "host.docker.internal:host-gateway"   # so the container can reach host Meridian on Linux too
    environment:
      # API-provider path: uncomment and switch provider to `anthropic` in your config.
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Enable dashboard auth when exposing beyond localhost:
      AETHON_DASHBOARD_TOKEN: ${AETHON_DASHBOARD_TOKEN:-}
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: aethon-ollama
    profiles: ["local"]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  aethon-data:
  ollama-data:
