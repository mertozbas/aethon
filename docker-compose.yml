# AETHON — Docker Compose
#
# Default — run AETHON headless (web UI + dashboard + webhook + messaging bots).
# Bring your own model provider: set OPENAI_API_KEY (default provider: openai), or point
# the config's model.host at any OpenAI-compatible base URL.
#
#     OPENAI_API_KEY=sk-... docker compose up --build
#     # open http://127.0.0.1:18790
#
# Fully-local inference instead (runs an Ollama service in Compose, no API key):
#
#     docker compose --profile local up --build
#     # build the image with EXTRAS=ollama (below) so it has the Ollama client, then set
#     # provider: ollama / host: http://ollama:11434 in the data volume's config.yaml

services:
  aethon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXTRAS: ""              # set to "ollama" to bundle the local-inference client
    image: aethon:latest
    container_name: aethon
    ports:
      - "18790:18790"
    volumes:
      - aethon-data:/home/aethon/.aethon
    extra_hosts:
      # Lets the container reach an OpenAI-compatible server running on the host
      # (set model.host to http://host.docker.internal:<port>/v1 in your config).
      - "host.docker.internal:host-gateway"
    environment:
      # Default provider is `openai`; pass your key through:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Anthropic API path: uncomment and switch provider to `anthropic` in your config.
      # ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # REQUIRED: the container binds 0.0.0.0 — AETHON refuses to start without
      # a token. Behind your own auth proxy you may instead override the command:
      #   command: ["aethon", "start", "--insecure-bind"]
      AETHON_DASHBOARD_TOKEN: ${AETHON_DASHBOARD_TOKEN:-}
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: aethon-ollama
    profiles: ["local"]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  aethon-data:
  ollama-data:
