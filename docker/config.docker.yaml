# AETHON — container defaults (headless: web UI + dashboard + webhook + bots; no interactive CLI).
#
# This file seeds /home/aethon/.aethon/config.yaml the first time the container runs
# against an empty data volume. To use your own settings, edit it inside the mounted
# volume or bind-mount a config over /home/aethon/.aethon/config.yaml.
#
# Model backend — bring your own provider:
#   - The default below uses the OpenAI API (set OPENAI_API_KEY in the environment).
#   - Or point `host` at ANY OpenAI-compatible base URL — e.g. a local server (vLLM /
#     LM Studio / LocalAI) or another service on your host/network. On Linux/macOS you
#     can reach a server on the host via host.docker.internal (add it to extra_hosts in
#     docker-compose.yml), e.g. host: http://host.docker.internal:8000/v1
#   - Or run fully-local inference with Ollama (see the commented block).

model:
  provider: openai
  model_id: gpt-4o
  api_key: ${OPENAI_API_KEY}
  # host: http://host.docker.internal:8000/v1   # any OpenAI-compatible base URL
  # --- Fully-local alternative (no API key) ---
  # provider: ollama
  # model_id: llama3.1
  # host: http://ollama:11434
  # --- Anthropic API alternative ---
  # provider: anthropic
  # model_id: claude-opus-4-8
  # api_key: ${ANTHROPIC_API_KEY}

channels:
  cli:
    enabled: false         # no interactive TTY inside a container
  webchat:
    enabled: true
    host: 0.0.0.0          # bind all interfaces so Docker port mapping reaches the server
    port: 18790

# Memory needs an embedding backend (Ollama). Disabled by default in the image;
# enable it and run an Ollama service (see docker-compose `local` profile) to use it.
memory:
  enabled: false

# REQUIRED: the container binds 0.0.0.0, so AETHON refuses to start when this
# resolves empty. Set AETHON_DASHBOARD_TOKEN in the container environment, or —
# only behind your own authenticating reverse proxy — override the command with
# `aethon start --insecure-bind`.
dashboard:
  enabled: true
  auth_token: ${AETHON_DASHBOARD_TOKEN}
